name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Configure a "pypi" environment with a Trusted Publisher on PyPI
    # (https://docs.pypi.org/trusted-publishers/) pointing at this workflow.
    environment:
      name: pypi
      url: https://pypi.org/p/geoqa
    permissions:
      id-token: write  # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
