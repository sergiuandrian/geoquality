name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Mypy
        run: mypy

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Verify build / CLI entrypoint
        run: |
          geoqa --version
          geoqa list-checks

      - name: Pytest (with coverage gate)
        run: pytest -q

  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    # Non-blocking: surfaces advisories in third-party deps without gating merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + pip-audit
        run: python -m pip install --upgrade pip && pip install -e "." pip-audit

      - name: pip-audit
        # Skip our own (non-PyPI) editable install; audit the dependency tree.
        run: pip-audit --skip-editable

  smoke:
    name: End-to-end smoke
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Generate sample data and run geoqa
        run: |
          python examples/make_sample_data.py
          geoqa run -c examples/geoqa.yml --html geoqa-report.html --json geoqa-report.json --no-fail
          test -f geoqa-report.html
          test -f geoqa-report.json

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geoqa-report
          path: geoqa-report.html
          if-no-files-found: error
