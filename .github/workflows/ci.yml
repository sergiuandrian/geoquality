name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Verify build / CLI entrypoint
        run: |
          geoqa --version
          geoqa list-checks

      - name: Pytest
        run: pytest -q

  smoke:
    name: End-to-end smoke
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Generate sample data and run geoqa
        run: |
          python examples/make_sample_data.py
          geoqa run -c examples/geoqa.yml --html geoqa-report.html --json geoqa-report.json

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geoqa-report
          path: geoqa-report.html
          if-no-files-found: error
